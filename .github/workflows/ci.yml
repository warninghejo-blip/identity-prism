name: CI
on:
  push:
    branches: [main, dev-v5]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build:staging
      - name: Upload coverage
        if: always()
        run: npx vitest run --coverage || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  lighthouse:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:staging
      - name: Run Lighthouse CI
        run: |
          npx -y @lhci/cli@0.13 autorun --collect.staticDistDir=./dist --upload.target=temporary-public-storage || true
