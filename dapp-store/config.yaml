  catalog:
    en-US:
      name: Identity Prism
      short_description: On-chain identity on Solana
      long_description: |
        Identity Prism scans any Solana wallet and builds a cosmic identity card with
        real on-chain data. Your tier (Mercury → Binary Sun) is determined by SOL balance,
        wallet age, transaction history, NFT holdings, and behavioral traits.

        Features:
        - 3D interactive planet card with score history sparkline and progress ring
        - 13 achievement badges with custom artwork
        - Prism League — Orbit Survival (dodge asteroids, MagicBlock-verified scores)
          and Cosmic Defender (top-down shooter, 4 levels, bosses, powerups)
        - Procedural Audio Engine — all game SFX synthesized via Web Audio API, zero files
        - Update Card — update NFT metadata without burning, Co-Sign Authority Guard
        - Mint identity as Metaplex Core NFT — pay with SOL or SKR (50% off for Seeker)
        - Black Hole — burn unwanted tokens and NFTs, reclaim rent SOL
        - Custom GLSL wormhole transitions at 60 FPS
        - Solana Blinks — share your card as an interactive link
        - Tapestry Social Graph integration
        - Full Solana Mobile Wallet Adapter (MWA) support for Seeker

        Built for the Solana community — collectors, degens, builders, and explorers.
      new_in_version: |
        v2.0.2: MagicBlock fast game-proof — instant score verification across all 3
        games (was slow/delayed). Fixed mint and identity-update transaction issues.
        Fixed loading-overlay getting stuck. Fixed wallet balance display. Fixed Vault
        buy flow. Coin purchases now verified on-chain. Improved identity-card
        discoverability with a clearer call-to-action and hint.

        v4.0: Cosmic Defender — new top-down shooter mode in Prism League (4 levels,
        bosses, powerups, 9 achievements). Update Card — update NFT metadata in-place
        without burning (~0.0005 SOL), protected by Co-Sign Authority Guard. Custom GLSL
        Wormhole Transitions for all navigation at 60 FPS. Procedural Audio Engine — all
        game SFX synthesized via Web Audio API, zero audio files. Redesigned badge artwork,
        4 new badges (13 total). Score History sparkline and Progress Ring on card back.
        Procedural plasma shader for Sun/Binary Sun with organic godrays. Realistic asteroid
        textures (Poly Haven CC0). InstancedMesh — 200 to 4 draw calls. Fixed wallet
        reconnection after dismissing connection dialog.
      saga_features: Full MWA support for Seeker — native signing, dismiss detection, optimized mobile UX.
